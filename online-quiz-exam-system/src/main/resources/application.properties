# Server
server.port=8080

# Load secrets from .env file — copy .env.example to .env and fill in your values
spring.config.import=optional:file:./.env[.properties]

# DataSource — credentials loaded from .env or Railway env vars
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/quizexam?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT — secret loaded from .env
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# CORS — allow React dev server and production Vercel domain
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}

# OpenRouter AI — key loaded from .env
openrouter.api.key=${OPENROUTER_API_KEY}

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Firebase Admin SDK
# Path is relative to the classpath (src/main/resources/).
# Download this file from: Firebase Console → Project Settings → Service accounts → Generate new private key
# IMPORTANT: add firebase-service-account.json to .gitignore so it is never committed.
firebase.service-account-path=firebase-service-account.json
