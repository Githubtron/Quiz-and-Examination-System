# Server
server.port=8080

# DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/quizexam?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
# Database password - fetched from Azure Key Vault
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT - Secret fetched from Azure Key Vault
# Replace <your-vault-name> with your actual Azure Key Vault name
azure.keyvault.uri=https://<your-vault-name>.vault.azure.net
app.jwt.secret-name=jwt-secret
app.jwt.expiration-ms=86400000

# CORS — allow React dev server
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

